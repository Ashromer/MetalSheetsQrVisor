<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" font-family="'Montserrat',Arial,sans-serif">
  <rect width="320" height="220" fill="#1d1a16"/>
  <text x="22" y="34" fill="#e7a3a6" font-size="12" font-weight="600" letter-spacing="2">VISTA</text>
  <text x="22" y="54" fill="#ece7df" font-size="18" font-family="'Cormorant Garamond',Georgia,serif" font-weight="600">El anclaje, parte del diseño</text>

  <!-- substructure -->
  <rect x="30" y="150" width="260" height="10" rx="2" fill="#3a352d"/>
  <!-- perfil trapezoidal -->
  <path d="M30,128 L66,128 L82,92 L114,92 L130,128 L166,128 L182,92 L214,92 L230,128 L266,128 L282,92 L290,92"
        fill="none" stroke="#cfc8bc" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- tornillos vistos en los valles, sobre la subestructura -->
  <g>
    <line x1="48" y1="128" x2="48" y2="150" stroke="#9a6b3a" stroke-width="1.4" stroke-dasharray="2 3"/>
    <line x1="148" y1="128" x2="148" y2="150" stroke="#9a6b3a" stroke-width="1.4" stroke-dasharray="2 3"/>
    <line x1="248" y1="128" x2="248" y2="150" stroke="#9a6b3a" stroke-width="1.4" stroke-dasharray="2 3"/>
    <circle cx="48" cy="128" r="5.5" fill="#7A1C28" stroke="#e7a3a6" stroke-width="1.2"/>
    <circle cx="148" cy="128" r="5.5" fill="#7A1C28" stroke="#e7a3a6" stroke-width="1.2"/>
    <circle cx="248" cy="128" r="5.5" fill="#7A1C28" stroke="#e7a3a6" stroke-width="1.2"/>
  </g>
  <text x="30" y="190" fill="#a89f93" font-size="11.5">Tornillo visto · ritmo de fijación en fachada</text>
</svg>
