<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil - Visor Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --brand-red-granate: rgb(182, 31, 38);
            --text-black: #1a1a1a;
            --text-white: #ffffff;
            --panel-black: #111111;
            --serif-font: 'Playfair Display', serif;
            --sans-font: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #ffffff;
            font-family: var(--sans-font);
            color: var(--text-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- BANDA 1: SUPERIOR --- */
        .brand-header {
            width: 100%;
            height: 80px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            border-bottom: 1px solid #ededed;
            z-index: 10;
        }

        .brand-name {
            font-family: var(--serif-font);
            font-size: 26px;
            letter-spacing: -0.5px;
            font-weight: 700;
            color: var(--brand-red-granate);
        }
        .brand-name::after { content: "."; color: var(--text-black); }

        .family-select {
            font-family: var(--sans-font);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 32px 8px 12px;
            border: 1px solid var(--brand-red-granate);
            background-color: transparent;
            color: var(--brand-red-granate);
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23B61F26'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        /* --- BANDA 2: CENTRAL (Visor) --- */
        .viewer-container {
            flex: 1;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* Mensaje de estado (carga / error) superpuesto */
        .status-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-align: center;
            padding: 20px;
            pointer-events: none;
            background: rgba(255,255,255,0.85);
        }
        .status-overlay.visible { display: flex; }
        .status-overlay .label {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #777;
            font-weight: 600;
        }
        .status-overlay.error .label { color: var(--brand-red-granate); }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e6e6e6;
            border-top-color: var(--brand-red-granate);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .status-overlay.error .spinner { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- BANDA 3: INFERIOR --- */
        .bottom-panel {
            width: 100%;
            background-color: var(--panel-black);
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .selector-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555555;
            font-weight: 600;
            text-align: center;
        }

        .type-selector {
            display: flex;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .type-btn {
            flex: 1;
            height: 46px;
            border: 1px solid #222222;
            background: transparent;
            color: #aaaaaa;
            font-family: var(--sans-font);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .type-btn:not(:first-child) { border-left: none; }
        .type-btn.active {
            background: var(--brand-red-granate);
            color: var(--text-white);
            border-color: var(--brand-red-granate);
        }

        .cta-button {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 14px;
            border: 1px solid #222222;
            background: #181818;
            color: var(--text-white);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .cta-button:hover {
            background: var(--brand-red-granate);
            border-color: var(--brand-red-granate);
            color: var(--text-white);
        }

        @media (min-width: 768px) {
            .brand-header { padding: 0 40px; }
            .bottom-panel { padding: 32px 40px; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="brand-name">metalperfil</div>
        <select class="family-select" id="familySelect">
            <option value="Pyramid">Pyramid</option>
            <option value="Symmetric">Symmetric</option>
            <option value="Asimmetric">Asimmetric</option>
            <option value="Eskaler">Eskaler</option>
        </select>
    </div>

    <div class="viewer-container">
        <model-viewer
            id="visorMetal"
            src="Pyramid_39.glb"
            alt="Perfil metálico Metalperfil"
            camera-controls
            touch-action="pan-y"
            auto-rotate
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1.2"
            bounds="tight"
            loading="eager"
            reveal="auto">
        </model-viewer>

        <div class="status-overlay" id="statusOverlay">
            <div class="spinner"></div>
            <div class="label" id="statusLabel">Cargando modelo…</div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="selector-label">Perfil / Espesor (mm)</div>
        <div class="type-selector" id="btnContainer"></div>
        <a href="https://ashromer.github.io/MetalSheetsQrVisor/" class="cta-button" target="_blank" rel="noopener">
            Acceder a la Página Web
        </a>
    </div>

    <script>
        const visor = document.getElementById('visorMetal');
        const btnContainer = document.getElementById('btnContainer');
        const familySelect = document.getElementById('familySelect');
        const overlay = document.getElementById('statusOverlay');
        const statusLabel = document.getElementById('statusLabel');

        // Mapeo de archivos .glb (respeta mayúsculas exactas del repo)
        const catalog = {
            Pyramid:    { prefix: 'Pyramid_',    types: ['39', '45', '68', '110'] },
            Symmetric:  { prefix: 'Symmetric_',  types: ['20', '40', '60', '80']  },
            Asimmetric: { prefix: 'Asimmetric_', types: ['15', '30', '45', '60']  },
            Eskaler:    { prefix: 'Eskaler_',    types: ['10', '25', '50', '75']  }
        };

        let currentFamily = 'Pyramid';

        function showStatus(text, isError) {
            statusLabel.textContent = text;
            overlay.classList.toggle('error', !!isError);
            overlay.classList.add('visible');
        }
        function hideStatus() {
            overlay.classList.remove('visible', 'error');
        }

        function setSource(src) {
            showStatus('Cargando modelo…', false);
            visor.src = src;
        }

        function renderButtons() {
            btnContainer.innerHTML = '';
            catalog[currentFamily].types.forEach((type, index) => {
                const btn = document.createElement('button');
                btn.className = 'type-btn' + (index === 0 ? ' active' : '');
                btn.textContent = type;
                btn.setAttribute('aria-pressed', index === 0 ? 'true' : 'false');
                btn.addEventListener('click', () => loadModel(type, btn));
                btnContainer.appendChild(btn);
            });
        }

        function loadModel(type, btnElement) {
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-pressed', 'false');
            });
            btnElement.classList.add('active');
            btnElement.setAttribute('aria-pressed', 'true');
            setSource(`${catalog[currentFamily].prefix}${type}.glb`);
        }

        function changeFamily(family) {
            currentFamily = family;
            renderButtons();
            const firstType = catalog[currentFamily].types[0];
            setSource(`${catalog[currentFamily].prefix}${firstType}.glb`);
        }

        familySelect.addEventListener('change', (e) => changeFamily(e.target.value));

        // Eventos del visor: feedback real de carga / error
        visor.addEventListener('load', () => {
            hideStatus();
            console.log('GLB cargado OK:', visor.src);
        });
        visor.addEventListener('error', (e) => {
            const detail = e.detail || {};
            console.error('Error model-viewer:', detail, visor.src);
            showStatus('No se pudo cargar este modelo', true);
        });

        // Init
        renderButtons();
        showStatus('Cargando modelo…', false);
    </script>
</body>
</html>
