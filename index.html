<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil — Visor 3D interactivo de perfiles de fachada</title>
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
    <meta name="description" content="Visor 3D interactivo de los perfiles arquitectónicos Metalperfil: gira la pieza, cambia el tipo y prueba acabados RAL en tiempo real. Enlaza con el catálogo de prescripción.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Metalperfil">
    <meta property="og:title" content="Metalperfil — Visor 3D interactivo de perfiles de fachada">
    <meta property="og:description" content="Gira el perfil en 3D, cambia de tipo y prueba acabados RAL en tiempo real. Envolventes metálicas de alta gama.">
    <meta property="og:image" content="https://ashromer.github.io/MetalSheetsQrVisor/img/propuesta/g_forest.jpg">
    <meta property="og:url" content="https://ashromer.github.io/MetalSheetsQrVisor/index.html">
    <link rel="canonical" href="https://ashromer.github.io/MetalSheetsQrVisor/index.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Metalperfil — Visor 3D interactivo de perfiles de fachada">
    <meta name="twitter:description" content="Gira el perfil en 3D, cambia de tipo y prueba acabados RAL en tiempo real.">
    <meta name="twitter:image" content="https://ashromer.github.io/MetalSheetsQrVisor/img/propuesta/g_forest.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --brand-red-granate: rgb(122, 28, 40);
            --text-black: #1a1a1a;
            --text-white: #ffffff;
            --panel-black: #111111;
            --serif-font: 'Cormorant Garamond', serif;
            --sans-font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; }
        html { background-color: var(--panel-black); }

        body {
            background-color: var(--panel-black);
            font-family: var(--sans-font);
            color: var(--text-black);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- BANDA 1: SUPERIOR (ahora en granate) --- */
        .brand-header {
            width: 100%;
            height: 72px;
            flex-shrink: 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--brand-red-granate);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Logo en lugar del texto */
        .brand-logo {
            height: clamp(40px, 10vw, 54px);
            width: auto;
            display: block;
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            color: var(--text-white);
            font-size: clamp(18px, 2.2vw, 28px);
            line-height: 1.1;
            text-align: center;
            flex: 1;
            padding: 0 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 720px) { .header-title { display: none; } }

        .family-select {
            font-family: var(--sans-font);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 36px 8px 16px;
            min-width: 160px;          /* más ancho para que quepa el nombre */
            border: 1px solid var(--panel-black);
            background-color: var(--panel-black);
            color: var(--text-white);
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23ffffff'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
        }
        .family-select option { color: var(--text-black); }

        /* --- BANDA 2: CENTRAL (Visor) --- */
        .viewer-container {
            width: 100%;
            height: 64vh;          /* ALTURA FIJA: model-viewer NO funciona con flex (queda a 0px) */
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .status-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-align: center;
            padding: 20px;
            pointer-events: none;
            background: rgba(255,255,255,0.85);
        }
        .status-overlay.visible { display: flex; }
        .status-overlay .label {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #777;
            font-weight: 600;
        }
        .status-overlay.error .label { color: var(--brand-red-granate); }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e6e6e6;
            border-top-color: var(--brand-red-granate);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .status-overlay.error .spinner { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- BANDA 3: INFERIOR (más compacta) --- */
        .bottom-panel {
            width: 100%;
            flex: 0 0 auto;        /* solo ocupa lo que mide su contenido */
            background-color: var(--panel-black);
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .selector-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555555;
            font-weight: 600;
            text-align: center;
        }

        .type-selector {
            display: flex;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .type-btn {
            flex: 1;
            height: 42px;
            border: 1px solid #222222;
            background: transparent;
            color: #aaaaaa;
            font-family: var(--sans-font);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .type-btn:not(:first-child) { border-left: none; }
        .type-btn:first-child { border-radius: 2px 0 0 2px; }
        .type-btn:last-child { border-radius: 0 2px 2px 0; }
        .type-btn.active {
            background: var(--brand-red-granate);
            color: var(--text-white);
            border-color: var(--brand-red-granate);
        }

        .color-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 500px;
            margin: 0 auto;
        }
        .color-swatch {
            width: 30px;               /* unificado con el catálogo (.vsw) */
            height: 30px;
            border-radius: 50%;
            border: 2px solid #333333;
            cursor: pointer;
            padding: 0;
            transition: transform 0.15s ease, border-color 0.15s ease;
            position: relative;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active {
            border-color: var(--text-white);
            transform: scale(1.12);
        }
        .color-swatch.active::after {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid var(--brand-red-granate);
        }

        .cta-button {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 2px auto 0 auto;
            padding: 12px;
            border: 1px solid #222222;
            background: #181818;
            color: var(--text-white);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .cta-button:hover {
            background: var(--brand-red-granate);
            border-color: var(--brand-red-granate);
            color: var(--text-white);
        }

        @media (min-width: 768px) {
            .brand-header { padding: 0 40px; height: 88px; }
            .brand-logo { height: 60px; }
            .bottom-panel { padding: 20px 40px; }
            .viewer-container { height: 66vh; }
        }

        /* ---- accesibilidad: reducir movimiento ---- */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important;
                transition-duration: .001ms !important; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <img src="assets/Metalperfil_white_trim.png" alt="Metalperfil" class="brand-logo">
        <div class="header-title">Revestimientos metálicos de alta gama</div>
        <select class="family-select" id="familySelect" aria-label="Familia de perfil"></select>
    </div>

    <div class="viewer-container">
        <model-viewer
            id="visorMetal"
            src="models/Pyramid_39.glb"
            alt="Perfil metálico Metalperfil"
            camera-controls
            disable-pan
            touch-action="pan-y"
            auto-rotate
            interaction-prompt="none"
            camera-orbit="35deg 75deg auto"
            min-camera-orbit="auto 0deg auto"
            max-camera-orbit="auto 180deg auto"
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1.2"
            loading="eager"
            reveal="auto"
            ar
            ar-modes="webxr scene-viewer quick-look">
        </model-viewer>

        <div class="status-overlay" id="statusOverlay">
            <div class="spinner"></div>
            <div class="label" id="statusLabel">Cargando modelo…</div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="selector-label">Perfil / Espesor (mm)</div>
        <div class="type-selector" id="btnContainer"></div>

        <div class="selector-label">Acabado / Color</div>
        <div class="color-selector" id="colorContainer"></div>

        <a href="#" class="cta-button" id="catalogLink" target="_blank" rel="noopener">
            Acceder al Catálogo
        </a>
    </div>

    <script>
        const visor          = document.getElementById('visorMetal');
        const btnContainer   = document.getElementById('btnContainer');
        const colorContainer = document.getElementById('colorContainer');
        const familySelect   = document.getElementById('familySelect');
        const overlay        = document.getElementById('statusOverlay');
        const statusLabel    = document.getElementById('statusLabel');
        const catalogLink    = document.getElementById('catalogLink');

        const CATALOG_PAGE = 'catalogo.html';

        // Cada familia: label (lo que se ve), prefix (nombre exacto del .glb),
        // types (sufijos de archivo), anchor (sección del catálogo).
        const catalog = {
            Pyramid:   { label: 'Pyramid',    prefix: 'models/Pyramid_',  types: ['39', '45', '68', '110'],                    anchor: 'pyramid'    },
            Symetric:  { label: 'Symmetric',  prefix: 'models/Symetric_', types: ['23', '25', '29', '40'],                     anchor: 'symmetric'  },
            Asymetric: { label: 'Asymmetric', prefix: 'models/Asymetric_',types: ['35', '55', '60', '80'],                     anchor: 'asymmetric' },
            Escaler:   { label: 'Escaler',    prefix: 'models/Escaler_',  types: ['22', '48', '55', '70'],                     anchor: 'escaler'    },
            Kaotiko:   { label: 'Kaotico',    prefix: 'models/Kaotiko_',  types: ['24', '28', '50', '73'],                     anchor: 'kaotico'    }
        };

        // Misma carta RAL que el catálogo (catalogo.html → RAL[])
        const colors = [
            { name: 'RAL 9005 · Negro intenso',    hex: '#0e0e10' },
            { name: 'RAL 7016 · Gris antracita',   hex: '#383E42' },
            { name: 'RAL 9006 · Aluminio blanco',  hex: '#A1A1A0' },
            { name: 'RAL 9010 · Blanco puro',      hex: '#F1F0EA' },
            { name: 'RAL 3005 · Rojo vino',        hex: '#5E2129' },
            { name: 'RAL 8017 · Marrón chocolate', hex: '#45322E' },
            { name: 'RAL 6005 · Verde musgo',      hex: '#2F4538' },
            { name: 'RAL 5011 · Azul acero',       hex: '#1E2A38' },
            { name: 'RAL 1015 · Marfil claro',     hex: '#E3D5B8' }
        ];

        // Deep-link desde el QR del catálogo: ?family=pyramid&type=45
        // (acepta clave, etiqueta o anchor; insensible a mayúsculas)
        const params = new URLSearchParams(location.search);
        function resolveFamily(p) {
            if (!p) return null;
            const q = p.trim().toLowerCase();
            return Object.keys(catalog).find(k =>
                k.toLowerCase() === q ||
                catalog[k].label.toLowerCase() === q ||
                catalog[k].anchor === q) || null;
        }
        let currentFamily = resolveFamily(params.get('family')) || 'Pyramid';
        const requestedType = params.get('type');
        let currentColor  = colors[0].hex;

        function showStatus(text, isError) {
            statusLabel.textContent = text;
            overlay.classList.toggle('error', !!isError);
            overlay.classList.add('visible');
        }
        function hideStatus() { overlay.classList.remove('visible', 'error'); }
        function setSource(src) { showStatus('Cargando modelo…', false); visor.src = encodeURI(src); }

        function populateFamilies() {
            familySelect.innerHTML = '';
            Object.keys(catalog).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = catalog[key].label;
                familySelect.appendChild(opt);
            });
            familySelect.value = currentFamily;
        }

        function updateCatalogLink() {
            catalogLink.href = `${CATALOG_PAGE}#${catalog[currentFamily].anchor}`;
        }

        const typeLabel = t => (typeof t === 'string') ? t : t.label;
        const typeFile  = t => (typeof t === 'string') ? t : t.file;

        function renderButtons() {
            btnContainer.innerHTML = '';
            catalog[currentFamily].types.forEach((type, index) => {
                const btn = document.createElement('button');
                btn.className = 'type-btn' + (index === 0 ? ' active' : '');
                btn.textContent = typeLabel(type);
                btn.addEventListener('click', () => loadModel(type, btn));
                btnContainer.appendChild(btn);
            });
        }

        function loadModel(type, btnElement) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            setSource(`${catalog[currentFamily].prefix}${typeFile(type)}.glb`);
        }

        function changeFamily(family) {
            currentFamily = family;
            renderButtons();
            updateCatalogLink();
            const firstType = catalog[currentFamily].types[0];
            setSource(`${catalog[currentFamily].prefix}${typeFile(firstType)}.glb`);
        }
        familySelect.addEventListener('change', (e) => changeFamily(e.target.value));

        function hexToRgba(hex) {
            const h = hex.replace('#', '');
            return [parseInt(h.substring(0,2),16)/255, parseInt(h.substring(2,4),16)/255, parseInt(h.substring(4,6),16)/255, 1];
        }
        function applyColor(hex) {
            currentColor = hex;
            if (!visor.model) return;
            visor.model.materials.forEach(mat => {
                if (mat.pbrMetallicRoughness) mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgba(hex));
            });
        }
        function renderColors() {
            colorContainer.innerHTML = '';
            colors.forEach((c, index) => {
                const sw = document.createElement('button');
                sw.className = 'color-swatch' + (index === 0 ? ' active' : '');
                sw.style.backgroundColor = c.hex;
                sw.title = c.name;
                sw.setAttribute('aria-label', c.name);
                sw.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    sw.classList.add('active');
                    applyColor(c.hex);
                });
                colorContainer.appendChild(sw);
            });
        }

        visor.addEventListener('load', () => {
            hideStatus();
            applyColor(currentColor);
            console.log('GLB OK:', visor.src);
        });
        visor.addEventListener('error', (e) => {
            console.error('Error model-viewer:', e.detail, visor.src);
            showStatus('No se pudo cargar este modelo', true);
        });

        // Init
        populateFamilies();
        renderButtons();
        renderColors();
        updateCatalogLink();

        // Carga inicial respetando el deep-link (familia + tipo opcional)
        const initTypes = catalog[currentFamily].types;
        const initType  = (requestedType && initTypes.map(typeFile).includes(requestedType))
            ? requestedType : initTypes[0];
        const initIndex = initTypes.findIndex(t => typeFile(t) === typeFile(initType));
        const initBtn   = btnContainer.children[initIndex >= 0 ? initIndex : 0];
        if (initBtn) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            initBtn.classList.add('active');
        }
        setSource(`${catalog[currentFamily].prefix}${typeFile(initType)}.glb`);

        if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) visor.removeAttribute('auto-rotate');
    </script>
</body>
</html>
