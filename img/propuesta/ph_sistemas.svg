<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="'Montserrat',Arial,sans-serif">
  <rect width="400" height="300" fill="#f7f5f1"/>
  <line x1="200" y1="46" x2="200" y2="258" stroke="#d9d3c9" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="22" y="34" fill="#7A1C28" font-size="12.5" font-weight="600" letter-spacing="1.4">FIJACIÓN VISTA</text>
  <text x="222" y="34" fill="#7A1C28" font-size="12.5" font-weight="600" letter-spacing="1.4">FIJACIÓN OCULTA</text>

  <!-- LEFT: perfil trapezoidal + tornillos vistos -->
  <rect x="24" y="170" width="156" height="9" rx="1.5" fill="#cfc8bc"/>
  <path d="M24,152 L52,152 L64,120 L86,120 L98,152 L126,152 L138,120 L160,120 L172,152 L180,152"
        fill="none" stroke="#1c1b1a" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="75" y1="120" x2="75" y2="170" stroke="#9a6b3a" stroke-width="1.3" stroke-dasharray="2 3"/>
  <line x1="149" y1="120" x2="149" y2="170" stroke="#9a6b3a" stroke-width="1.3" stroke-dasharray="2 3"/>
  <circle cx="75" cy="120" r="5" fill="#7A1C28"/>
  <circle cx="149" cy="120" r="5" fill="#7A1C28"/>
  <text x="24" y="212" fill="#44403b" font-size="11.5">El tornillo atraviesa la cara</text>
  <text x="24" y="228" fill="#44403b" font-size="11.5">y forma parte de la estética.</text>

  <!-- RIGHT: panel continuo + clip oculto -->
  <path d="M224,128 L300,128 L314,110 L378,110" fill="none" stroke="#1c1b1a" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M224,152 L300,152 L314,134 L378,134" fill="none" stroke="#1c1b1a" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M300,152 C292,158 290,170 300,176 L314,176" fill="none" stroke="#9a6b3a" stroke-width="1.6" stroke-dasharray="3 3"/>
  <rect x="298" y="170" width="20" height="9" rx="1.5" fill="none" stroke="#9a6b3a" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="224" y="212" fill="#44403b" font-size="11.5">El anclaje queda detrás:</text>
  <text x="224" y="228" fill="#44403b" font-size="11.5">superficie continua, sin tornillos.</text>
</svg>
