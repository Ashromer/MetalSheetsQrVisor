<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil - Visor 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #787878;
            --soft-gray: #f8f8f8;
            --border-color: #e5e5e5;
            --serif-font: 'Playfair Display', serif;
            --sans-font: 'Inter', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--sans-font);
            color: var(--text-color);
            height: 100vh;
            display: block;
            position: relative;
            overflow: hidden;
        }

        /* Encabezado minimalista corporativo */
        .brand-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 20px;
            display: block;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .brand-name {
            font-family: var(--serif-font);
            font-size: 24px;
            letter-spacing: -0.5px;
            font-weight: 700;
            line-height: 1;
        }

        .product-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-top: 4px;
        }

        /* El área del visor 3D */
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: var(--soft-gray);
            display: block;
        }

        /* Indicador flotante sutil de interactividad */
        .viewer-hint {
            position: absolute;
            top: 95px;
            right: 20px;
            font-family: var(--serif-font);
            font-style: italic;
            font-size: 13px;
            color: var(--accent-color);
            pointer-events: none;
            z-index: 5;
        }

        /* Panel de control inferior adaptado a móviles */
        .controls-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.02);
        }

        .selector-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Contenedor del selector y el botón web */
        .actions-row {
            display: block; /* Diseño limpio vertical en móvil */
        }

        /* Botones de variantes (Estilo caja minimalista de la presentación) */
        .type-selector {
            display: table;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .type-btn {
            display: table-cell;
            width: 48px;
            height: 48px;
            border: 1px solid var(--text-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-family: var(--serif-font);
            font-size: 18px;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Unificamos bordes intermedios para simular cuadrícula editorial */
        .type-btn:not(:first-child) {
            border-left: none;
        }

        .type-btn.active, .type-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Botón de redirección a la web (Enlace elegante y sobrio) */
        .cta-button {
            display: block;
            width: 100%;
            padding: 16px;
            border: 1px solid var(--text-color);
            background: transparent;
            color: var(--text-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="brand-name">metalperfil</div>
        <div class="product-title">Colección de Paneles / Pyramid</div>
    </div>

    <div class="viewer-hint">Vista interactiva 3D</div>

    <model-viewer 
        id="visorMetal" 
        src="familia_chapas.glb" 
        camera-controls 
        touch-action="pan-y"
        auto-rotate 
        shadow-intensity="1" 
        environment-image="neutral"
        exposure="1.15">
    </model-viewer>

    <div class="controls-panel">
        <div class="selector-label">Selección de perfil</div>
        
        <div class="actions-row">
            <div class="type-selector">
                <button class="type-btn active" onclick="updateType('A', this)">1</button>
                <button class="type-btn" onclick="updateType('B', this)">2</button>
                <button class="type-btn" onclick="updateType('C', this)">3</button>
                <button class="type-btn" onclick="updateType('D', this)">4</button>
            </div>
            
            <a href="https://tu-pagina-web-comercial.com/catalogo" class="cta-button" target="_blank">
                Ver Catálogo Completo
            </a>
        </div>
    </div>

    <script>
        const visor = document.getElementById('visorMetal');
        const tipos = ['A', 'B', 'C', 'D'];

        function updateType(tipo, btn) {
            // Cambiar estado visual del botón activo
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Cambiar visibilidad de las capas dentro del archivo .glb
            if (visor.model) {
                const escena = visor.model.scene;
                tipos.forEach(t => {
                    const obj = escena.find(o => o.name === `tipo_${t}`);
                    if (obj) {
                        obj.visible = (t === tipo);
                    }
                });
                // Forzar el refresco del renderizado 3D
                visor.queueRender();
            }
        }

        // Cuando el .glb termine de cargar en el móvil, dejamos visible solo el tipo 1 (A)
        visor.addEventListener('load', () => {
            const escena = visor.model.scene;
            tipos.forEach((t, i) => {
                const obj = escena.find(o => o.name === `tipo_${t}`);
                if (obj) {
                    obj.visible = (i === 0);
                }
            });
            visor.queueRender();
        });
    </script>
</body>
</html>
