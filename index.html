<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil - Visor Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --brand-red: #e30613; /* El rojo corporativo de fondo */
            --text-black: #1a1a1a;
            --text-white: #ffffff;
            --border-color: rgba(26, 26, 26, 0.15);
            --serif-font: 'Playfair Display', serif;
            --sans-font: 'Inter', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--brand-red); /* Fondo general en rojo */
            font-family: var(--sans-font);
            color: var(--text-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scrolls extraños en la interfaz */
        }

        /* Encabezado Superior */
        .brand-header {
            width: 100%;
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-logo-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-name {
            font-family: var(--serif-font);
            font-size: 28px;
            letter-spacing: -0.5px;
            font-weight: 700;
            line-height: 1;
            color: var(--text-black); /* Logo en negro */
        }

        /* El punto del logo en blanco para contrastar sobre el fondo rojo */
        .brand-name::after {
            content: ".";
            color: var(--text-white);
        }

        .product-type-label {
            font-family: var(--sans-font);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-black); /* Tipo de plancha a la derecha en negro */
        }

        /* Contenedor del Visor Central */
        .viewer-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 20px;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            max-height: 55vh; /* Ajuste para dejar aire arriba y abajo en móviles */
            /* Mantenemos un fondo de iluminación neutro y limpio para el objeto 3D */
            --poster-color: transparent; 
            background-color: transparent;
        }

        /* Panel de Control Inferior (Botonera + Web) */
        .bottom-panel {
            width: 100%;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .selector-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-black);
            font-weight: 600;
            text-align: center;
        }

        /* Botones de tipos de perfil */
        .type-selector {
            display: flex;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .type-btn {
            flex: 1;
            height: 50px;
            border: 1px solid var(--text-black);
            background: transparent;
            color: var(--text-black);
            font-family: var(--sans-font);
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .type-btn:not(:first-child) {
            border-left: none;
        }

        /* Estado activo: se vuelve negro con texto blanco */
        .type-btn.active {
            background: var(--text-black);
            color: var(--text-white);
        }

        /* Botón de acceso a la página web */
        .cta-button {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            border: 1px solid var(--text-black);
            background: var(--text-black);
            color: var(--text-white);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: transparent;
            color: var(--text-black);
        }

        /* Ajustes de optimización para pantallas Desktop grandes */
        @media (min-width: 768px) {
            .brand-header {
                padding: 40px 60px;
            }
            .brand-name {
                font-size: 32px;
            }
            .bottom-panel {
                padding: 40px 60px;
                gap: 20px;
            }
            model-viewer {
                max-height: 60vh;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <!-- Encabezado Superior -->
    <div class="brand-header">
        <div class="brand-logo-zone">
            <!-- Texto corporativo en Negro -->
            <div class="brand-name">metalperfil</div>
        </div>
        <!-- Tipo de plancha actual a la derecha en Negro -->
        <div class="product-type-label">Pyramid</div>
    </div>

    <!-- Visor 3D Central -->
    <div class="viewer-container">
        <model-viewer 
            id="visorMetal" 
            src="Pyramid_39.glb" 
            camera-controls 
            touch-action="pan-y"
            auto-rotate 
            shadow-intensity="1" 
            environment-image="neutral"
            exposure="1.2">
        </model-viewer>
    </div>

    <!-- Panel de Control Inferior -->
    <div class="bottom-panel">
        <div class="selector-label">Perfil / Espesor (mm)</div>
        
        <!-- Selectores de Tipos -->
        <div class="type-selector">
            <button class="type-btn active" onclick="updateType('33', this)">33</button>
            <button class="type-btn" onclick="updateType('45', this)">45</button>
            <button class="type-btn" onclick="updateType('68', this)">68</button>
            <button class="type-btn" onclick="updateType('110', this)">110</button>
        </div>
        
        <!-- Enlace de salida hacia el catálogo web -->
        <a href="https://ashromer.github.io/MetalSheetsQrVisor/" class="cta-button" target="_blank">
            Acceder a la Página Web
        </a>
    </div>

    <script>
        const visor = document.getElementById('visorMetal');
        const tipos = ['33', '45', '68', '110'];

        function updateType(tipo, btn) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (visor.model) {
                const escena = visor.model.scene;
                tipos.forEach(t => {
                    const obj = escena.find(o => o.name === `tipo_${t}`);
                    if (obj) {
                        obj.visible = (t === tipo);
                    }
                });
                visor.queueRender();
            }
        }

        // Dejamos limpia la carga inicial para evitar errores de visualización con el GLB temporal
        visor.addEventListener('load', () => {
            if (visor.model) {
                const escena = visor.model.scene;
                // Si ya existen las capas tipo_33, tipo_45... inicializa con la primera
                const tieneCapas = tipos.some(t => escena.find(o => o.name === `tipo_${t}`));
                
                if (tieneCapas) {
                    tipos.forEach((t, i) => {
                        const obj = escena.find(o => o.name === `tipo_${t}`);
                        if (obj) obj.visible = (i === 0);
                    });
                    visor.queueRender();
                }
            }
        });
    </script>
</body>
</html>
