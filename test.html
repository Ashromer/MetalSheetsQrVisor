<!DOCTYPE html>
<html>
<head>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin:0">
<model-viewer
    src="Pyramid_39.glb"
    camera-controls
    auto-rotate
    camera-orbit="35deg 75deg auto"
    min-camera-orbit="-60deg 30deg auto"
    max-camera-orbit="60deg 110deg auto"
    disable-pan
    style="width:100vw;height:100vh;background:#eee">
</model-viewer>
</body>
</html>
