<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" font-family="'Montserrat',Arial,sans-serif">
  <rect width="320" height="220" fill="#1d1a16"/>
  <text x="22" y="34" fill="#e7a3a6" font-size="12" font-weight="600" letter-spacing="2">OCULTA</text>
  <text x="22" y="54" fill="#ece7df" font-size="18" font-family="'Cormorant Garamond',Georgia,serif" font-weight="600">Piel continua, sin anclajes</text>

  <!-- subestructura -->
  <rect x="30" y="158" width="260" height="10" rx="2" fill="#3a352d"/>
  <!-- panel continuo: dos bandejas que machihembran -->
  <path d="M30,118 L150,118 L162,100 L182,100" fill="none" stroke="#cfc8bc" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M168,118 L290,118 L302,100" fill="none" stroke="#cfc8bc" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- clip oculto detrás del solape (fantasma bronce) -->
  <path d="M150,118 C140,124 138,140 150,146 L168,146 C156,140 158,124 168,118"
        fill="none" stroke="#9a6b3a" stroke-width="1.6" stroke-dasharray="3 3"/>
  <line x1="159" y1="146" x2="159" y2="158" stroke="#9a6b3a" stroke-width="1.4" stroke-dasharray="2 3"/>
  <text x="118" y="196" fill="#9a6b3a" font-size="10.5">clip oculto</text>
  <text x="30" y="210" fill="#a89f93" font-size="11.5">Solape machihembrado · fijación no visible</text>
</svg>
