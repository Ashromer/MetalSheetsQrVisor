<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil - Visor Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --brand-red: rgb(182, 31, 38); /* Tu color exacto */
            --text-black: #1a1a1a;
            --text-white: #ffffff;
            --panel-black: #111111;
            --serif-font: 'Playfair Display', serif;
            --sans-font: 'Inter', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--brand-red); /* Fondo general rojo */
            font-family: var(--sans-font);
            color: var(--text-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Encabezado Superior */
        .brand-header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-name {
            font-family: var(--serif-font);
            font-size: 26px;
            letter-spacing: -0.5px;
            font-weight: 700;
            color: var(--text-black);
        }

        .brand-name::after {
            content: ".";
            color: var(--text-white);
        }

        /* Selector de familias moderno */
        .family-select {
            font-family: var(--sans-font);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 32px 8px 12px;
            border: 1px solid var(--text-black);
            background-color: transparent;
            color: var(--text-black);
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%231a1a1a'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        /* Contenedor del Visor Central - AHORA EN BLANCO */
        .viewer-container {
            flex: 1;
            margin: 0 20px;
            background-color: #ffffff; /* Cuadro del visor blanco */
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* Panel de Control Inferior - AHORA EN NEGRO */
        .bottom-panel {
            width: 100%;
            background-color: var(--panel-black); /* Fondo negro inferior */
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .selector-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #777777;
            font-weight: 600;
            text-align: center;
        }

        /* Botones de tipos de perfil */
        .type-selector {
            display: flex;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .type-btn {
            flex: 1;
            height: 46px;
            border: 1px solid #333333;
            background: transparent;
            color: #aaaaaa;
            font-family: var(--sans-font);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .type-btn:not(:first-child) {
            border-left: none;
        }

        .type-btn.active {
            background: var(--brand-red); /* Destaca tu tipo seleccionado en rojo */
            color: var(--text-white);
            border-color: var(--brand-red);
        }

        /* Botón de acceso a la página web */
        .cta-button {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 14px;
            border: 1px solid #333333;
            background: #222222;
            color: var(--text-white);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: var(--text-white);
            color: var(--text-black);
        }

        @media (min-width: 768px) {
            .brand-header { padding: 30px 40px; }
            .bottom-panel { padding: 30px 40px; }
            .viewer-container { margin: 0 40px; }
            model-viewer { max-height: 65vh; }
        }
    </style>
</head>
<body>

    <!-- Encabezado Superior -->
    <div class="brand-header">
        <div class="brand-name">metalperfil</div>
        
        <!-- Desplegable con los nuevos productos añadidos -->
        <select class="family-select" onchange="changeFamily(this.value)">
            <option value="pyramid">Pyramid</option>
            <option value="symmetric">Symmetric</option>
            <option value="asimmetric">Asimmetric</option>
            <option value="eskaler">Eskaler</option>
        </select>
    </div>

    <!-- Visor 3D Central con Fondo Blanco -->
    <div class="viewer-container">
        <model-viewer 
            id="visorMetal" 
            src="Pyramid_39.glb" 
            camera-controls 
            touch-action="pan-y"
            auto-rotate 
            shadow-intensity="1" 
            environment-image="neutral"
            exposure="1.2">
        </model-viewer>
    </div>

    <!-- Panel de Control Inferior con Fondo Negro -->
    <div class="bottom-panel">
        <div class="selector-label">Perfil / Espesor (mm)</div>
        
        <!-- Los botones se generarán dinámicamente con JavaScript -->
        <div class="type-selector" id="btnContainer"></div>
        
        <a href="https://ashromer.github.io/MetalSheetsQrVisor/" class="cta-button" target="_blank">
            Acceder a la Página Web
        </a>
    </div>

    <script>
        const visor = document.getElementById('visorMetal');
        const btnContainer = document.getElementById('btnContainer');

        // Base de datos de productos y sus archivos correspondientes
        const catalog = {
            pyramid: {
                prefix: 'Pyramid_',
                types: ['39', '45', '68', '110'] // Vinculados directamente a tus archivos .glb
            },
            symmetric: {
                prefix: 'Symmetric_',
                types: ['20', '40', '60', '80'] // Datos asignados de prueba
            },
            asimmetric: {
                prefix: 'Asimmetric_',
                types: ['15', '30', '45', '60'] // Datos asignados de prueba
            },
            eskaler: {
                prefix: 'Eskaler_',
                types: ['10', '25', '50', '75'] // Datos asignados de prueba
            }
        };

        let currentFamily = 'pyramid';

        // Genera los botones inferiores según la familia activa
        function renderButtons() {
            btnContainer.innerHTML = '';
            const familyData = catalog[currentFamily];
            
            familyData.types.forEach((type, index) => {
                const btn = document.createElement('button');
                btn.className = `type-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = type;
                btn.onclick = () => loadModel(type, btn);
                btnContainer.appendChild(btn);
            });
        }

        // Cambia el archivo .glb del visor directamente al pulsar el botón
        function loadModel(type, btnElement) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            const familyData = catalog[currentFamily];
            // Construye el nombre exacto del archivo: ej: Pyramid_45.glb
            visor.src = `${familyData.prefix}${type}.glb`; 
        }

        // Maneja el cambio de producto desde el menú desplegable superior
        function changeFamily(family) {
            currentFamily = family;
            renderButtons();
            
            // Carga el primer modelo por defecto de la nueva familia seleccionada
            const firstType = catalog[currentFamily].types[0];
            visor.src = `${catalog[currentFamily].prefix}${firstType}.glb`;
        }

        // Inicialización de la pantalla al cargar
        renderButtons();
    </script>
</body>
</html>
