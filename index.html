<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metalperfil - Visor Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #787878;
            --brand-red: #e30613; /* El rojo corporativo */
            --soft-gray: #f8f8f8;
            --border-color: #e5e5e5;
            --serif-font: 'Playfair Display', serif;
            --sans-font: 'Inter', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        /* Corregimos la estructura para evitar bloqueos y permitir adaptabilidad total */
        body {
            background-color: var(--bg-color);
            font-family: var(--sans-font);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Encabezado adaptativo */
        .brand-header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
            z-index: 10;
        }

        .brand-name {
            font-family: var(--serif-font);
            font-size: 26px;
            letter-spacing: -0.5px;
            font-weight: 700;
            line-height: 1;
        }

        /* DETALLE EN ROJO: El punto o sutil indicador de marca */
        .brand-name::after {
            content: ".";
            color: var(--brand-red);
        }

        /* Desplegable elegante para cambiar de familia (MetalSheets) */
        .family-select {
            font-family: var(--sans-font);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 32px 8px 12px;
            border: 1px solid var(--text-color);
            background-color: transparent;
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%231a1a1a'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        .family-select:focus {
            border-color: var(--brand-red);
        }

        /* Contenedor principal: En Desktop va en paralelo, en Móvil en columna */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* El área del visor 3D se adapta al espacio disponible */
        model-viewer {
            width: 100%;
            flex: 1;
            min-height: 50vh; /* Asegura buen tamaño en móviles sin romper el layout */
            background-color: var(--soft-gray);
        }

        .viewer-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--serif-font);
            font-style: italic;
            font-size: 13px;
            color: var(--accent-color);
            pointer-events: none;
            z-index: 5;
        }

        /* Panel de control inferior/lateral */
        .controls-panel {
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            padding: 24px 20px;
            z-index: 10;
        }

        .selector-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Botones de variantes adaptados (33, 45, 68, 110) */
        .type-selector {
            display: flex;
            width: 100%;
        }

        .type-btn {
            flex: 1;
            height: 48px;
            border: 1px solid var(--text-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-family: var(--sans-font); /* Cambiado a sans para códigos numéricos técnicos */
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .type-btn:not(:first-child) {
            border-left: none;
        }

        /* DETALLE EN ROJO: El botón activo ahora destaca con el marco o fondo sutil de marca */
        .type-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        /* Botón de redirección a la web */
        .cta-button {
            display: block;
            width: 100%;
            padding: 16px;
            border: 1px solid var(--text-color);
            background: transparent;
            color: var(--text-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: var(--brand-red); /* DETALLE EN ROJO: Feedback visual al pasar el ratón */
            color: white;
            border-color: var(--brand-red);
        }

        /* --- MEDIA QUERIES PARA ESCRITORIO (DESKTOP) --- */
        @media (min-width: 768px) {
            body {
                overflow: hidden; /* En desktop fijamos para evitar scroll global */
            }
            .main-content {
                flex-direction: row; /* Ponemos el visor al lado de los controles */
            }
            model-viewer {
                min-height: auto;
                height: calc(100vh - 77px);
            }
            .controls-panel {
                width: 380px;
                border-top: none;
                border-left: 1px solid var(--border-color);
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 40px;
            }
            .actions-row {
                gap: 24px;
            }
            .type-selector {
                display: grid;
                grid-template-columns: 1fr 1fr; /* Formato matriz 2x2 en desktop */
                gap: 10px;
            }
            .type-btn:not(:first-child) {
                border-left: 1px solid var(--text-color);
            }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="brand-name">metalperfil</div>
        
        <select class="family-select" onchange="changeFamily(this.value)">
            <option value="pyramid">Pyramid</option>
            <option value="wave">Wave</option>
            <option value="trapezoidal">Trapezoidal</option>
        </select>
    </div>

    <div class="main-content">
        <div class="viewer-hint">Vista interactiva 3D</div>

        <model-viewer 
            id="visorMetal" 
            src="Pyramid_39.glb" 
            camera-controls 
            touch-action="pan-y"
            auto-rotate 
            shadow-intensity="1" 
            environment-image="neutral"
            exposure="1.15">
        </model-viewer>

        <div class="controls-panel">
            <div class="selector-label">Canto / Espesor Perfil (mm)</div>
            
            <div class="actions-row">
                <div class="type-selector">
                    <button class="type-btn active" onclick="updateType('33', this)">33</button>
                    <button class="type-btn" onclick="updateType('45', this)">45</button>
                    <button class="type-btn" onclick="updateType('68', this)">68</button>
                    <button class="type-btn" onclick="updateType('110', this)">110</button>
                </div>
                
                <a href="https://ashromer.github.io/MetalSheetsQrVisor/" class="cta-button" target="_blank">
                    Ver en Catálogo Web
                </a>
            </div>
        </div>
    </div>

    <script>
        const visor = document.getElementById('visorMetal');
        // Mapeamos los nuevos nombres de tus tipos reales
        const tipos = ['33', '45', '68', '110'];

        function updateType(tipo, btn) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (visor.model) {
                const escena = visor.model.scene;
                tipos.forEach(t => {
                    // El código buscará objetos llamados 'tipo_33', 'tipo_45', etc.
                    const obj = escena.find(o => o.name === `tipo_${t}`);
                    if (obj) {
                        obj.visible = (t === tipo);
                    }
                });
                visor.queueRender();
            }
        }

        // Al cambiar el desplegable de familia de chapas
        function changeFamily(familyName) {
            // Ejemplo de cómo redirigirías a las otras subcarpetas que crees en GitHub
            if(familyName !== 'pyramid') {
                window.location.href = `https://ashromer.github.io/MetalSheetsQrVisor/${familyName}/`;
            }
        }

        visor.addEventListener('load', () => {
            const escena = visor.model.scene;
            tipos.forEach((t, i) => {
                const obj = escena.find(o => o.name === `tipo_${t}`);
                if (obj) {
                    obj.visible = (i === 0); // Inicializa mostrando el tipo 33
                }
            });
            visor.queueRender();
        });
    </script>
</body>
</html>
